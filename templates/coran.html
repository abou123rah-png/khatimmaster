    <script>
        // ===== Normalisation arabe robuste (JS) =====
        // 1) Mappages explicites (restent MINIMAUX, pas de changement visuel)
        const ARABIC_REPLACEMENTS = {
            'أ': 'ا', 'إ': 'ا', 'آ': 'ا',
            'ؤ': 'و', 'ئ': 'ى', // conforme à ta logique Python d'origine
            'ة': 'ه',
            'ٱ': 'ا',
            'ى': 'ي',           // optionnel : unifier alif maqṣūra vers ya
            'ّ': '', 'َ': '', 'ُ': '', 'ِ': '', 'ْ': '', 'ٰ': '', 'ـ': '',
            'ﷲ': 'الله'        // ligature spéciale U+FDF2 -> forme décomposée
        };

        // 2) Regex des diacritiques + tatweel (couverture large)
        const ARABIC_DIACRITICS_REGEX = /[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED\u0640]/g;

        // 3) Fonction de normalisation inspirée de ta version Python
        function normaliserTexte(texte) {
            if (!texte) return '';

            // a) NFKC pour décomposer les formes de présentation arabes, puis NFKD
            // (NFKC suffit souvent, mais on enchaîne par sécurité)
            let t = texte.normalize('NFKC').normalize('NFKD');

            // b) Suppression diacritiques (voyelles courtes, shadda, tatweel, etc.)
            t = t.replace(ARABIC_DIACRITICS_REGEX, '');

            // c) Remplacement ciblé de ligatures connues (Allah)
            t = t.replace(/\uFDF2/g, 'الله');

            // d) Remplacements lettre-à-lettre comme en Python
            let out = '';
            for (const c of t) {
                out += (ARABIC_REPLACEMENTS[c] !== undefined) ? ARABIC_REPLACEMENTS[c] : c;
            }
            return out;
        }

        // ===== Recherche =====
        function compterOccurrences(mot, texte) {
            const motEchappe = mot.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(motEchappe, 'g');
            const correspondances = texte.match(regex);
            return correspondances ? correspondances.length : 0;
        }

        let coranVersets = [];

        async function chargerCoran() {
            try {
                // ✅ Chemin correct depuis Flask static/
                const response = await fetch('/static/coran_clean.txt');
                if (!response.ok) throw new Error('Fichier non trouvé');

                const text = await response.text();

                // Découpage simple par ligne (comme ton .splitlines())
                coranVersets = text.split('\n');

                // Pré-normalisation (accélère la recherche côté client)
                coranVersets = coranVersets.map(v => ({
                    brut: v,
                    norm: normaliserTexte(v)
                }));

                document.getElementById('resultBox').innerText = "Prêt pour la recherche. Entrez un mot.";
            } catch (error) {
                document.getElementById('resultBox').innerHTML = 
                    `<span class="error-message">Erreur: Fichier '/static/coran_clean.txt' introuvable.</span>`;
                console.error('Erreur de chargement du Coran:', error);
            }
        }

        function rechercherMot() {
            const mot = document.getElementById('arabicWord').value.trim();
            const resultatBox = document.getElementById('resultBox');

            if (!mot) {
                resultatBox.innerHTML = `<span class="error-message">Veuillez entrer un mot arabe.</span>`;
                return;
            }

            const motNormalise = normaliserTexte(mot);
            if (!motNormalise) {
                resultatBox.innerHTML = `<span class="error-message">Mot invalide après normalisation.</span>`;
                return;
            }

            resultatBox.innerHTML = "Recherche en cours...";

            setTimeout(() => {
                let occurrences = 0;
                const versetsTrouves = [];

                for (let i = 0; i < coranVersets.length; i++) {
                    const { brut, norm } = coranVersets[i];
                    if (!norm) continue;

                    const count = compterOccurrences(motNormalise, norm);
                    if (count > 0) {
                        occurrences += count;
                        // Affiche le verset original (brut) pour garder l'écriture intacte
                        versetsTrouves.push(`📖 <b>Verset ${i + 1}:</b> ${brut.trim()}`);
                    }
                }

                let resultatHTML;
                if (occurrences > 0) {
                    resultatHTML = `<div class="mb-4">
                        <p class="text-xl mb-3">🔍 <b>Le mot '${mot}' apparaît ${occurrences} fois dans le Coran.</b></p>
                        ${versetsTrouves.map(v => `<p class="mb-2">${v}</p>`).join('')}
                    </div>`;
                } else {
                    resultatHTML = `<p class="text-xl">❌ <b>Le mot '${mot}' n'apparaît pas dans le texte.</b></p>`;
                }

                resultatBox.innerHTML = resultatHTML;
            }, 50);
        }

        document.addEventListener('DOMContentLoaded', () => {
            chargerCoran();
            const input = document.getElementById('arabicWord');
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') rechercherMot();
            });
        });
    </script>
