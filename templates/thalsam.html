  <script>
    const correspondances = {
      "ا": 1, "أ": 1, "ب": 2, "ت": 400, "ث": 500, "ج": 3, "ح": 8, "خ": 600, "د": 4,
      "ذ": 700, "ر": 200, "ز": 7, "س": 60, "ش": 300, "ص": 90, "ض": 800, "ط": 9,
      "ظ": 900, "ع": 70, "غ": 1000, "ف": 80, "ق": 100, "ك": 20, "ل": 30, "م": 40,
      "ن": 50, "ه": 5, "و": 6, "ي": 10
    };

    function genererCombinaisonsVariees(pm) {
      const lettresTriees = Object.entries(correspondances).sort((a, b) => b[1] - a[1]);
      let combinaison = [];
      let reste = pm;
      let derniereLettre = null;

      while (reste > 0) {
        if (reste >= 900) {
          const choix = Math.random() < 0.5 ? "غ" : "ش";
          combinaison.push(choix);
          reste -= correspondances[choix];
          derniereLettre = choix;
        } else {
          const candidats = lettresTriees.filter(([lettre, val]) => val <= reste && lettre !== derniereLettre);
          if (candidats.length > 0) {
            const [lettre, val] = candidats[Math.floor(Math.random() * candidats.length)];
            combinaison.push(lettre);
            reste -= val;
            derniereLettre = lettre;
          } else {
            combinaison.push("غ");
            reste -= 1000;
          }
        }
      }
      return combinaison;
    }

    function ajouterProtection(talsam) {
      return talsam.join('') + ' النور';
    }

    function genererTalsam() {
      const pm = parseInt(document.getElementById("pm").value);
      if (isNaN(pm) || pm <= 0) {
        document.getElementById("resultat").textContent = "Veuillez entrer un nombre PM valide.";
        return;
      }
      const combinaisons = genererCombinaisonsVariees(pm);
      const talsam = ajouterProtection(combinaisons);
      document.getElementById("resultat").textContent = talsam;
    }
  </script>
