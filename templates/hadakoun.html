<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatim Hadakoun — Carré Mystique avec Valeurs des Lettres Arabes — KhatimMaster</title>
    <meta name="description" content="Générez un Khatim Hadakoun en calculant les valeurs numériques (PM) des lettres arabes selon leur nature (feu, terre, air, eau). Entrez trois mots pour obtenir un carré mystique personnalisé basé sur la science des lettres.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding-top: 60px; /* Espace pour l'en-tête */
            padding-bottom: 40px; /* Espace pour le pied de page */
        }
        
        .arabic-text {
            font-size: 1.4rem;
            text-align: center;
            direction: rtl;
            color: white;
        }
        
        .mystic-container {
            background: rgba(21, 138, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .mystic-table-cell {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            min-width: 60px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mystic-table-cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(106, 17, 203, 0.3);
        }
        
        .btn-calculer {
            background: linear-gradient(45deg, #2E8B57 0%, #3CB371 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(46, 139, 87, 0.3);
        }
        
        .btn-calculer:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(46, 139, 87, 0.4);
        }
        
        .btn-retour {
            background: linear-gradient(45deg, #8A2BE2 0%, #9932CC 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }
        
        .btn-retour:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.4);
        }
        
        .input-mystic {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 180, 255, 0.3);
        }
        
        .input-mystic:focus {
            outline: none;
            border-color: #158aff;
            box-shadow: 0 0 0 3px rgba(21, 138, 255, 0.3);
        }
        
        .result-table {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }
        
        .result-cell {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            min-width: 80px;
            min-height: 60px;
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .arabic-number {
            font-family: 'Tajawal', sans-serif;
            direction: rtl;
            unicode-bidi: embed;
        }
        
        /* En-tête simple */
        .simple-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        .simple-header .logo img {
            width: 30px;
            height: 30px;
        }
        
        /* Pied de page simple */
        .simple-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 10px 20px;
            z-index: 1000;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-footer a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- En-tête simple (une seule ligne) -->
    <header class="simple-header">
        <a href="{{ url_for('accueil') }}" class="logo">
            <img src="{{ url_for('static', filename='images/icone.png') }}" alt="KhatimMaster">
            KhatimMaster
        </a>
        <span class="text-white text-sm">Calcul des valeurs des lettres arabes</span>
    </header>

    <div class="mystic-container w-full max-w-2xl overflow-hidden relative p-6">
        <!-- Floating decorative elements -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white bg-opacity-10 rounded-full"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-white bg-opacity-5 rounded-full"></div>
        <div class="absolute top-4 left-4 text-white text-2xl">
            <i class="fas fa-moon floating"></i>
        </div>
        <div class="absolute top-4 right-4 text-white text-2xl">
            <i class="fas fa-star floating" style="animation-delay: 0.5s;"></i>
        </div>
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Calculateur de Valeurs Arabes</h1>
            <p class="text-blue-200 opacity-90">Système de numérologie arabe traditionnelle</p>
        </div>
        
        <!-- Input fields -->
        <div class="mb-6">
            <label for="mot-a" class="block text-lg font-medium text-white mb-2">
                <i class="fas fa-font mr-2"></i>Mot a:
            </label>
            <input 
                type="text" 
                id="mot-a" 
                class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg"
                placeholder="Entrez le mot a"
            >
        </div>
        
        <div class="mb-6">
            <label for="mot-b" class="block text-lg font-medium text-white mb-2">
                <i class="fas fa-font mr-2"></i>Mot b:
            </label>
            <input 
                type="text" 
                id="mot-b" 
                class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg"
                placeholder="Entrez le mot b"
            >
        </div>
        
        <div class="mb-8">
            <label for="mot-c" class="block text-lg font-medium text-white mb-2">
                <i class="fas fa-font mr-2"></i>Mot c:
            </label>
            <input 
                type="text" 
                id="mot-c" 
                class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg"
                placeholder="Entrez le mot c"
            >
        </div>
        
        <!-- Buttons -->
        <div class="flex flex-col md:flex-row gap-4 justify-center mb-8">
            <button 
                onclick="calculer()"
                class="btn-calculer text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3"
            >
                <i class="fas fa-calculator"></i>
                Calculer
            </button>
            
            <button 
                onclick="returnToHome()"
                class="btn-retour text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3"
            >
                <i class="fas fa-home"></i>
                Retour
            </button>
        </div>
        
        <!-- Error message -->
        <div id="error" class="text-red-400 text-center mb-6 hidden"></div>
        
        <!-- Result table -->
        <div id="table-container" class="hidden">
            <h2 class="text-xl font-bold text-white mb-4 text-center">Tableau des Résultats</h2>
            <div id="result-table" class="result-table mb-8">
                <!-- Table cells will be generated here -->
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center text-white text-sm">
            <p>Système basé sur la numérologie arabe traditionnelle</p>
            <div class="flex justify-center gap-4 mt-3 text-white text-opacity-70">
                <i class="fas fa-hamsa"></i>
                <i class="fas fa-eye"></i>
                <i class="fas fa-hand-sparkles"></i>
            </div>
        </div>
    </div>

    <!-- Pied de page simple (une seule ligne) -->
    <footer class="simple-footer">
        &copy; KhatimMaster - Par M. Cissé. Tous droits réservés. | <a href="mailto:cissdoro@gmail.com">cissdoro@gmail.com</a>
    </footer>

    <script>
        // Tableau de correspondance des lettres arabes et leurs natures
        const lettres_nature = {
            'feu': ['ا', 'أ', 'ط', 'م', 'ف', 'س', 'ذ', 'ه'],
            'terre': ['ب', 'و', 'ي', 'ن', 'ض', 'ت', 'ظ'],
            'air': ['ج', 'ز', 'ك', 'ص', 'ق', 'ث', 'غ', 'ح'],
            'eau': ['د', 'ح', 'ل', 'ع', 'ر', 'خ', 'ش']
        };

        // Système de valeurs numériques pour les lettres arabes
        const valeurs_numeriques = {
            "ا": 1, "أ": 1, "ب": 2, "ت": 400, "ث": 500, "ج": 3, "ح": 8, "خ": 600, "د": 4, "ذ": 700, "ر": 200,
            "ز": 7, "س": 60, "ش": 300, "ص": 90, "ض": 800, "ط": 9, "ظ": 900, "ع": 70, "غ": 1000, "ف": 80,
            "ق": 100, "ك": 20, "ل": 30, "م": 40, "ن": 50, "ه": 5, "و": 6, "ي": 10
        };

        // Fonction pour convertir les nombres en chiffres arabes
        function toArabicNumerals(number) {
            const arabicNumerals = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return number.toString().split('').map(digit => arabicNumerals[parseInt(digit)]).join('');
        }

        // Fonction pour calculer la somme des lettres par nature
        function calculer_somme_par_nature(mots) {
            const somme_nature = {'feu': 0, 'terre': 0, 'air': 0, 'eau': 0};
            
            for (const mot of mots) {
                for (const lettre of mot) {
                    const valeur_lettre = valeurs_numeriques[lettre] || 0;
                    for (const [nature, lettres] of Object.entries(lettres_nature)) {
                        if (lettres.includes(lettre)) {
                            somme_nature[nature] += valeur_lettre;
                        }
                    }
                }
            }
            
            return somme_nature;
        }

        // Fonction pour afficher le tableau final fusionné
        function afficher_tableau(somme_nature) {
            const tableau = [
                [65 + somme_nature['terre'], "كن", 63 + somme_nature['feu']],
                [64, "الله", 68],
                [69 + somme_nature['eau'], 62, 67 + somme_nature['air']]
            ];

            const container = document.getElementById('result-table');
            container.innerHTML = '';

            tableau.forEach(row => {
                row.forEach(value => {
                    const cell = document.createElement('div');
                    cell.className = 'result-cell arabic-text';
                    
                    // Convert numbers to Arabic numerals, leave Arabic text as is
                    if (typeof value === 'number') {
                        cell.textContent = toArabicNumerals(value);
                        cell.classList.add('arabic-number');
                    } else {
                        cell.textContent = value;
                    }
                    
                    container.appendChild(cell);
                });
            });
        }

        // Fonction pour gérer le clic sur le bouton de calcul
        function calculer() {
            const mot_a = document.getElementById('mot-a').value;
            const mot_b = document.getElementById('mot-b').value;
            const mot_c = document.getElementById('mot-c').value;
            const error = document.getElementById('error');

            if (!mot_a || !mot_b || !mot_c) {
                error.classList.remove('hidden');
                error.textContent = "Veuillez entrer des valeurs pour tous les mots";
                document.getElementById('table-container').classList.add('hidden');
                return;
            }

            const resultats = calculer_somme_par_nature([mot_a, mot_b, mot_c]);
            afficher_tableau(resultats);

            error.classList.add('hidden');
            document.getElementById('table-container').classList.remove('hidden');
            document.getElementById('table-container').scrollIntoView({behavior: 'smooth'});
        }

        function returnToHome() {
            window.location.href = "{{ url_for('accueil') }}";
        }

        // Allow pressing Enter in input fields to calculate
        document.getElementById('mot-a').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculer();
        });

        document.getElementById('mot-b').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculer();
        });

        document.getElementById('mot-c').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculer();
        });
    </script>
</body>
