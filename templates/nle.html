    <script>
        // Arabic letter weights mapping
        const arabicWeights = {
            "ا": 1, "أ": 1, "ب": 1, "ت": 1, "ث": 1, "ج": 1, "ح": 1, "خ": 1, "د": 1, "ذ": 1, "ر": 1,
            "ز": 1, "س": 1, "ش": 1, "ص": 1, "ض": 1, "ط": 1, "ظ": 1, "ع": 1, "غ": 1, "ف": 1,
            "ق": 1, "ك": 1, "ل": 1, "م": 1, "ن": 1, "ه": 1, "و": 1, "ي": 1
        };
        
        // Calculate mystical weight of a phrase
        function calculateMysticalWeight(phrase) {
            return Array.from(phrase).reduce((sum, letter) => {
                return sum + (arabicWeights[letter] || 0);
            }, 0);
        }
        
        // Display the result with animation
        function displayResult(weight) {
            const resultContainer = document.getElementById('result-container');
            const resultText = document.getElementById('result-text');
            
            resultText.textContent = `Le nombre de lettre(s) ésotérique(s) est : ${weight}`;
            resultContainer.classList.remove('hidden');
            
            // Add animation effect
            resultContainer.style.opacity = '0';
            resultContainer.style.transform = 'translateY(20px)';
            
            let opacity = 0;
            let yPos = 20;
            const fadeIn = setInterval(() => {
                opacity += 0.05;
                yPos -= 1;
                resultContainer.style.opacity = opacity;
                resultContainer.style.transform = `translateY(${yPos}px)`;
                
                if (opacity >= 1) {
                    clearInterval(fadeIn);
                    resultContainer.style.opacity = '';
                    resultContainer.style.transform = '';
                }
            }, 20);
        }
        
        // Main function to calculate and display the weight
        function calculateAndDisplay() {
            const phrase = document.getElementById('arabic-phrase').value.trim();
            
            if (!phrase) {
                alert("Veuillez entrer une phrase en arabe.");
                return;
            }
            
            const mysticalWeight = calculateMysticalWeight(phrase);
            displayResult(mysticalWeight);
        }
        
        // Event listeners
        document.getElementById('calculate-btn').addEventListener('click', calculateAndDisplay);
        
        document.getElementById('home-btn').addEventListener('click', () => {
            window.location.href = "{{ url_for('accueil') }}";
        });
        
        // Allow pressing Enter in input field to calculate
        document.getElementById('arabic-phrase').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculateAndDisplay();
        });
    </script>
