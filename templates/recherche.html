            background: linear-gradient(45deg, #158aff 0%, #00b4ff 100%);

            box-shadow: 0 4px 15px rgba(21, 138, 255, 0.3);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(21, 138, 255, 0.4);
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 123, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 123, 0, 0); }

            border-color: #158aff;

        .content-container {
            max-height: 60vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(21, 138, 255, 0.5) transparent;
        }
        
        .content-container::-webkit-scrollbar {
            width: 8px;
        }

            background: transparent;
        }
        
        .content-container::-webkit-scrollbar-thumb {
            background-color: rgba(21, 138, 255, 0.5);
            border-radius: 10px;
        }
        
        .animate-bounce {
            animation: bounce 1s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .sourate-title {
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(21,138,255,0.3) 50%, rgba(255,255,255,0.1) 100%);

        .verse-number {

            margin-left: 5px;
            font-size: 0.8rem;
            color: white;
        }
        
        /* En-tête simple */
        .simple-header {

            left: 0;
            right: 0;

                <i class="fas fa-pray"></i>

    <script>

            "An-Nas (Les Hommes)"
        ];

        // Generate sourate options from 1 to 114 with names
        function generateSourateOptions() {
            const select = document.getElementById('sourate-select');
            
            for (let i = 1; i <= 114; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Sourate ${i} - ${sourateNames[i-1]}`;
                select.appendChild(option);
            }
        }
        
        // Load sourate content
        async function loadSourate() {
            const sourateNumber = document.getElementById('sourate-select').value;
            const errorMessage = document.getElementById('error-message');
            const sourateContainer = document.getElementById('sourate-container');
            const sourateTitle = document.getElementById('sourate-title');
            const sourateName = document.getElementById('sourate-name');
            const sourateContent = document.getElementById('sourate-content');
            
            if (!sourateNumber) {
                errorMessage.textContent = "Veuillez sélectionner une sourate.";
                errorMessage.classList.remove('hidden');
                sourateContainer.classList.add('hidden');
                return;
            }
            
            errorMessage.classList.add('hidden');
            
            try {
                // Show loading state
                sourateContent.innerHTML = '<div class="text-center py-8"><i class="fas fa-spinner fa-spin text-2xl"></i></div>';
                sourateContainer.classList.remove('hidden');
                sourateTitle.textContent = `Sourate ${sourateNumber}`;
                sourateName.textContent = sourateNames[sourateNumber-1];
                
                // Load the text file with correct path
                const response = await fetch(`/static/coran/sourates/${sourateNumber}.txt`);
                
                if (!response.ok) {
                    throw new Error('Sourate non trouvée');
                }
                
                const text = await response.text();
                
                // Split verses and add numbering
                const verses = text.split('\n').filter(v => v.trim() !== '');
                let formattedContent = '';
                
                verses.forEach((verse, index) => {
                    const verseNumber = index + 1;
                    formattedContent += `
                        <div class="verse mb-4">
                            <span class="verse-number">${verseNumber}</span>
                            ${verse}
                        </div>
                    `;
                });
                
                // Display the content with proper formatting
                sourateContent.innerHTML = formattedContent;
                
                // Scroll to the content
                sourateContainer.scrollIntoView({ behavior: 'smooth' });
                
                // Add animation to title
                sourateTitle.classList.add('animate-bounce');
                setTimeout(() => {
                    sourateTitle.classList.remove('animate-bounce');
                }, 1000);
                
            } catch (error) {
                errorMessage.textContent = "Erreur lors du chargement de la sourate. Veuillez réessayer.";
                errorMessage.classList.remove('hidden');
                sourateContainer.classList.add('hidden');
                console.error('Error loading sourate:', error);
            }
        }
        
        // Event listeners
        document.addEventListener('DOMContentLoaded', generateSourateOptions);
        
        document.getElementById('load-btn').addEventListener('click', loadSourate);
        
        document.getElementById('home-btn').addEventListener('click', () => {
            window.location.href = "{{ url_for('accueil') }}";
        });
        
        // Allow pressing Enter in select to load sourate
        document.getElementById('sourate-select').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadSourate();
        });
        
        // Add hover effects to buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(button => {
            button.addEventListener('mouseenter', () => {
                if (button.id === 'load-btn') {
                    button.style.transform = 'translateY(-3px)';
                    button.style.boxShadow = '0 10px 20px rgba(255, 123, 0, 0.4)';
                } else if (button.id === 'home-btn') {
                    button.style.transform = 'translateY(-3px)';
                    button.style.boxShadow = '0 10px 20px rgba(21, 138, 255, 0.4)';
                }
            });
            
            button.addEventListener('mouseleave', () => {
                button.style.transform = '';
                if (button.id === 'load-btn') {
                    button.style.boxShadow = '0 4px 15px rgba(255, 123, 0, 0.3)';
                } else if (button.id === 'home-btn') {
                    button.style.boxShadow = '0 4px 15px rgba(21, 138, 255, 0.3)';
                }
            });
        });
    </script>
