<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatim Moussadis 6x6 — Carré de Vénus pour Amour, Harmonie & Beauté — KhatimMaster</title>
    <meta name="description" content="Générez un Khatim Moussadis (carré 6x6) associé à la planète Vénus. Utilisé pour attirer l'amour, l'harmonie, la beauté, le mariage, et la réconciliation. Entrez votre PM et la progression pour créer votre talisman spirituel.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding-top: 60px; /* Espace pour l'en-tête */
            padding-bottom: 40px; /* Espace pour le pied de page */
        }

        .arabic-text {
            font-family: 'Tajawal', sans-serif;
            font-size: 1.5rem;
            text-align: center;
        }

        .mystic-container {
            background: rgba(21, 138, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .mystic-table-cell {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            min-width: 80px;
            min-height: 80px;
        }

        .mystic-table-cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(106, 17, 203, 0.3);
        }

        .btn-mystic {
            background: linear-gradient(45deg, #ff7b00 0%, #ffaa00 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 123, 0, 0.3);
        }

        .btn-mystic:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 123, 0, 0.4);
        }

        .btn-home {
            background: linear-gradient(45deg, #158aff 0%, #00b4ff 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(21, 138, 255, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(21, 138, 255, 0.4);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .input-mystic {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 180, 255, 0.3);
        }

        .input-mystic:focus {
            outline: none;
            border-color: #158aff;
            box-shadow: 0 0 0 3px rgba(21, 138, 255, 0.3);
        }
        
        /* En-tête simple */
        .simple-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        .simple-header .logo img {
            width: 30px;
            height: 30px;
        }
        
        /* Pied de page simple */
        .simple-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 10px 20px;
            z-index: 1000;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-footer a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- En-tête simple (une seule ligne) -->
  <header class="simple-header">
    <a href="{{ url_for('accueil') }}" class="logo">
      <img src="{{ url_for('static', filename='images/icone.png') }}" alt="KhatimMaster">
      KhatimMaster
    </a>
    <span class="text-white text-sm">MOUSSADIS 6x6 - Tableau Mystique</span>
  </header>

    <div class="mystic-container w-full max-w-4xl overflow-hidden relative p-6">
        <!-- Décorations flottantes -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white bg-opacity-10 rounded-full"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-white bg-opacity-5 rounded-full"></div>
        <div class="absolute top-4 left-4 text-white text-2xl">
            <i class="fas fa-moon floating"></i>
        </div>
        <div class="absolute top-4 right-4 text-white text-2xl">
            <i class="fas fa-star floating" style="animation-delay: 0.5s;"></i>
        </div>

        <!-- En-tête -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">MOUSSADIS 6x6</h1>
            <p class="text-blue-200 opacity-90">Générateur de Tableau Mystique</p>
        </div>

        <!-- Formulaire -->
        <div class="mb-8">
            <div class="mb-6">
                <label for="pm-value" class="block text-lg font-medium text-white mb-2">
                    <i class="fas fa-calculator mr-2"></i>Entrez la valeur de votre PM :
                </label>
                <input 
                    type="number" 
                    id="pm-value" 
                    class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg"
                    placeholder="Valeur numérique..."
                >
            </div>
            
            <div class="mb-8">
                <label for="progression-value" class="block text-lg font-medium text-white mb-2">
                    <i class="fas fa-chart-line mr-2"></i>Entrez la valeur de la progression :
                </label>
                <input 
                    type="number" 
                    id="progression-value" 
                    class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg"
                    placeholder="Valeur numérique..."
                >
            </div>
        </div>

        <!-- Boutons -->
        <div class="flex flex-col md:flex-row gap-4 justify-center mb-8">
            <button 
                id="generate-btn" 
                class="btn-mystic text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3 pulse"
            >
                <i class="fas fa-magic"></i>
                Générer le tableau
            </button>
            
            <button 
                id="home-btn" 
                class="btn-home text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3"
            >
                <i class="fas fa-home"></i>
                Retour à l'accueil
            </button>
        </div>

        <!-- Message d'erreur -->
        <div id="error-message" class="text-red-400 text-center mb-6 hidden"></div>

        <!-- Tableau -->
        <div id="table-container" class="hidden">
            <h2 class="text-xl font-bold text-white mb-4 text-center">Tableau Mystique 6x6</h2>
            <div id="mystic-table" class="grid grid-cols-6 gap-3 mb-8"></div>
        </div>

        <!-- Footer -->
        <div class="text-center text-white text-sm">
            <p>Système basé sur la numérologie arabe traditionnelle</p>
            <div class="flex justify-center gap-4 mt-3 text-white text-opacity-70">
                <i class="fas fa-hamsa"></i>
                <i class="fas fa-eye"></i>
                <i class="fas fa-hand-sparkles"></i>
            </div>
        </div>
    </div>

    <!-- Pied de page simple (une seule ligne) -->
    <footer class="simple-footer">
        &copy; KhatimMaster - Par M. Cissé. Tous droits réservés. | <a href="mailto:cissdoro@gmail.com">cissdoro@gmail.com</a>
    </footer>

    <script>
        const arabicNumbers = {
            0: '٠', 1: '١', 2: '٢', 3: '٣', 4: '٤',
            5: '٥', 6: '٦', 7: '٧', 8: '٨', 9: '٩'
        };

        function toArabicNumerals(number) {
            return String(number).split('').map(digit => arabicNumbers[digit]).join('');
        }

        function generateTable(a, b) {
            if (b >= 105 * a) {
                const remainder = (b - 105 * a) % 6;
                const c = (b - 105 * a - remainder) / 6;
                let tableau = [];

                switch(remainder) {
                    case 0:
                        tableau = [
                            [c + 17*a, c + 11*a, c + 21*a, c + 22*a, c + 34*a, c],
                            [c + 2*a, c + 28*a, c + 9*a, c + 4*a, c + 29*a, c + 33*a],
                            [c + 12*a, c + 3*a, c + 30*a, c + 27*a, c + 10*a, c + 23*a],
                            [c + 20*a, c + 31*a, c + 6*a, c + 7*a, c + 26*a, c + 15*a],
                            [c + 19*a, c + 8*a, c + 25*a, c + 32*a, c + 5*a, c + 16*a],
                            [c + 35*a, c + 24*a, c + 14*a, c + 13*a, c + a, c + 18*a]
                        ];
                        break;
                    case 1:
                        tableau = [
                            [c + 17*a, c + 11*a, c + 21*a, c + 22*a, c + 34*a + 1, c],
                            [c + 2*a, c + 28*a, c + 9*a, c + 4*a, c + 29*a, c + 33*a + 1],
                            [c + 12*a, c + 3*a, c + 30*a + 1, c + 27*a, c + 10*a, c + 23*a],
                            [c + 20*a, c + 31*a + 1, c + 6*a, c + 7*a, c + 26*a, c + 15*a],
                            [c + 19*a, c + 8*a, c + 25*a, c + 32*a + 1, c + 5*a, c + 16*a],
                            [c + 35*a + 1, c + 24*a, c + 14*a, c + 13*a, c + a, c + 18*a]
                        ];
                        break;
                    // Ajouter les autres cas de remainder ici...
                }
                return tableau;
            }
            return null;
        }

        function displayTable(table) {
            const container = document.getElementById('table-container');
            const errorMessage = document.getElementById('error-message');
            const mysticTable = document.getElementById('mystic-table');
            
            mysticTable.innerHTML = '';

            if (!table) {
                errorMessage.textContent = "Condition non remplie : b doit être ≥ 105 × a";
                errorMessage.classList.remove('hidden');
                container.classList.add('hidden');
                return;
            }

            table.forEach(row => {
                row.forEach(value => {
                    const cell = document.createElement('div');
                    cell.className = 'mystic-table-cell rounded-lg p-4 flex items-center justify-center text-white text-xl';
                    cell.textContent = toArabicNumerals(value);
                    mysticTable.appendChild(cell);
                });
            });

            errorMessage.classList.add('hidden');
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function generateAndDisplay() {
            const a = parseInt(document.getElementById('progression-value').value);
            const b = parseInt(document.getElementById('pm-value').value);

            if (isNaN(a) || isNaN(b)) {
                document.getElementById('error-message').textContent = "Veuillez entrer des valeurs valides";
                document.getElementById('error-message').classList.remove('hidden');
                return;
            }

            const table = generateTable(a, b);
            displayTable(table);
        }

        // Gestion des événements
        document.getElementById('generate-btn').addEventListener('click', generateAndDisplay);
        document.getElementById('home-btn').addEventListener('click', () => {
            window.location.href = "{{ url_for('accueil') }}";
        });

        document.getElementById('pm-value').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateAndDisplay();
        });

        document.getElementById('progression-value').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateAndDisplay();
        });
    </script>
</body>
