{% extends 'base.html' %}

{% block title %}Liste des Sourates{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>📜 Liste des Sourates</h2>
    <div class="row">
        {% for num in sourates %}
        <div class="col-md-2 mb-2">
            <a href="{{ url_for('afficher_sourate', num=num) }}" class="btn btn-outline-primary w-100">
                Sourate {{ num }}
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
