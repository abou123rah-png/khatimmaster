<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khatim Moussalas Fermé — Carré Mystique 3x3 de Saturne — KhatimMaster</title>
<meta name="description" content="Générez un Khatim Moussalas fermé (3x3) associé à la planète Saturne. Utilisé pour la protection, la transmutation, la sécurité, la rivalité, et la destruction des forces négatives. Entrez votre PM et la progression pour créer votre carré ésotérique.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding-top: 60px; /* Espace pour l'en-tête */
            padding-bottom: 40px; /* Espace pour le pied de page */
        }
        
        .arabic-text {
            font-family: 'Tajawal', sans-serif;
            font-size: 1.5rem;
            text-align: right;
            direction: rtl;
        }
        
        .mystic-container {
            background: rgba(21, 138, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .mystic-table-cell {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            min-width: 80px;
            min-height: 80px;
        }
        
        .mystic-table-cell:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(106, 17, 203, 0.3);
        }
        
        .btn-mystic {
            background: linear-gradient(45deg, #ff7b00 0%, #ffaa00 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 123, 0, 0.3);
        }
        
        .btn-mystic:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 123, 0, 0.4);
        }
        
        .btn-home {
            background: linear-gradient(45deg, #158aff 0%, #00b4ff 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(21, 138, 255, 0.3);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(21, 138, 255, 0.4);
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 123, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 123, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 123, 0, 0); }
        }
        
        .input-mystic {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 180, 255, 0.3);
        }
        
        .input-mystic:focus {
            outline: none;
            border-color: #158aff;
            box-shadow: 0 0 0 3px rgba(21, 138, 255, 0.3);
        }
        
        /* En-tête simple */
        .simple-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        .simple-header .logo img {
            width: 30px;
            height: 30px;
        }
        
        /* Pied de page simple */
        .simple-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 10px 20px;
            z-index: 1000;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-footer a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
    
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- En-tête simple (une seule ligne) -->
  <header class="simple-header">
    <a href="{{ url_for('accueil') }}" class="logo">
      <img src="{{ url_for('static', filename='images/icone.png') }}" alt="KhatimMaster">
      KhatimMaster
    </a>
    <span class="text-white text-sm">MOUSSALAS FERME - Tableau Mystique</span>
  </header>

    <div class="mystic-container w-full max-w-2xl overflow-hidden relative p-6">
        <!-- Floating decorative elements -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-white bg-opacity-10 rounded-full"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-white bg-opacity-5 rounded-full"></div>
        <div class="absolute top-4 left-4 text-white text-2xl">
            <i class="fas fa-moon floating"></i>
        </div>
        <div class="absolute top-4 right-4 text-white text-2xl">
            <i class="fas fa-star floating" style="animation-delay: 0.5s;"></i>
        </div>
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">MOUSSALAS FERME</h1>
            <p class="text-blue-200 opacity-90">Générateur de Tableau Mystique 3x3</p>
        </div>
        
        <!-- Main content -->
        <div class="mb-8">
            <!-- Input fields -->
            <div class="mb-6">
                <label for="pm-value" class="block text-lg font-medium text-white mb-2">
                    <i class="fas fa-calculator mr-2"></i>Entrez la valeur de votre PM :
                </label>
                <input 
                    type="number" 
                    id="pm-value" 
                    class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg"
                    placeholder="Valeur numérique..."
                >
            </div>
            
            <div class="mb-8">
                <label for="progression-value" class="block text-lg font-medium text-white mb-2">
                    <i class="fas fa-chart-line mr-2"></i>Entrez la valeur de la progression :
                </label>
                <input 
                    type="number" 
                    id="progression-value" 
                    class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg"
                    placeholder="Valeur numérique..."
                >
            </div>
            
            <!-- Buttons -->
            <div class="flex flex-col md:flex-row gap-4 justify-center mb-8">
                <button 
                    id="generate-btn" 
                    class="btn-mystic text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3 pulse"
                >
                    <i class="fas fa-magic"></i>
                    Générer le tableau
                </button>
                
                <button 
                    id="home-btn" 
                    class="btn-home text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3"
                >
                    <i class="fas fa-home"></i>
                    Retour à l'accueil
                </button>
            </div>
            
            <!-- Error message -->
            <div id="error-message" class="text-red-400 text-center mb-6 hidden"></div>
            
            <!-- Result table -->
            <div id="table-container" class="hidden">
                <h2 class="text-xl font-bold text-white mb-4 text-center">Tableau Mystique 3x3</h2>
                <div id="mystic-table" class="grid grid-cols-3 gap-3 mb-8">
                    <!-- Table cells will be generated here -->
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center text-white text-sm">
            <p>Système basé sur la numérologie arabe traditionnelle</p>
            <div class="flex justify-center gap-4 mt-3 text-white text-opacity-70">
                <i class="fas fa-hamsa"></i>
                <i class="fas fa-eye"></i>
                <i class="fas fa-hand-sparkles"></i>
            </div>
        </div>
    </div>

    <!-- Pied de page simple (une seule ligne) -->
    <footer class="simple-footer">
        &copy; KhatimMaster - Par M. Cissé. Tous droits réservés. | <a href="mailto:cissdoro@gmail.com">cissdoro@gmail.com</a>
    </footer>

    <script>
        // Arabic numerals mapping
        const arabicNumbers = {
            0: '٠', 1: '١', 2: '٢', 3: '٣', 4: '٤',
            5: '٥', 6: '٦', 7: '٧', 8: '٨', 9: '٩'
        };

        // Convert number to Arabic numerals
        function toArabicNumerals(number) {
            return String(number).split('').map(digit => arabicNumbers[digit]).join('');
        }

        // Generate the 3x3 table with the new algorithm
        function generateTable(a, b) {
            let n = null;
            let p = 0, m = 0;
            
            // Check condition
            if (b >= 12 * a) {
                if ((b - 12 * a) % 3 === 0) {
                    n = (b - 12 * a) / 3;
                } else if ((b - 12 * a) % 3 === 1) {
                    n = Math.floor((b - 12 * a) / 3);
                    p = 1;
                } else {
                    n = Math.floor((b - 12 * a) / 3);
                    m = 1;
                }
                
                return [
                    [n + 3 * a, n + 8 * a + p, n + a + m],
                    [n + 2 * a, n + 4 * a, n + 6 * a],
                    [n + 7 * a + m, n, n + 5 * a]
                ];
            } else {
                return null; // Return null if condition not met
            }
        }

        // Display the generated table
        function displayTable(table) {
            const tableContainer = document.getElementById('table-container');
            const mysticTable = document.getElementById('mystic-table');
            const errorMessage = document.getElementById('error-message');
            
            // Clear previous table
            mysticTable.innerHTML = '';
            
            if (table === null) {
                errorMessage.textContent = "Condition non remplie : b doit être ≥ 12 × a";
                errorMessage.classList.remove('hidden');
                tableContainer.classList.add('hidden');
                return;
            }
            
            // Generate table cells
            table.forEach(row => {
                row.forEach(value => {
                    const cell = document.createElement('div');
                    cell.className = 'mystic-table-cell rounded-lg p-4 flex items-center justify-center text-white text-xl';
                    
                    if (typeof value === 'number') {
                        // Display numbers in Arabic numerals
                        cell.textContent = toArabicNumerals(value);
                        cell.classList.add('font-mono');
                    } else {
                        // Display Arabic text
                        cell.textContent = value;
                        cell.classList.add('arabic-text');
                    }
                    
                    mysticTable.appendChild(cell);
                });
            });
            
            errorMessage.classList.add('hidden');
            tableContainer.classList.remove('hidden');
            tableContainer.scrollIntoView({ behavior: 'smooth' });
            
            // Add animation to cells
            setTimeout(() => {
                const cells = document.querySelectorAll('.mystic-table-cell');
                cells.forEach((cell, index) => {
                    setTimeout(() => {
                        cell.classList.add('animate-bounce');
                        setTimeout(() => {
                            cell.classList.remove('animate-bounce');
                        }, 1000);
                    }, index * 150);
                });
            }, 300);
        }

        // Main function to generate and display the table
        function generateAndDisplay() {
            const pmValue = document.getElementById('pm-value').value.trim();
            const progressionValue = document.getElementById('progression-value').value.trim();
            const errorMessage = document.getElementById('error-message');
            
            // Validate inputs
            if (!pmValue || !progressionValue) {
                errorMessage.textContent = "Veuillez entrer des valeurs numériques valides.";
                errorMessage.classList.remove('hidden');
                return;
            }
            
            const pm = parseInt(pmValue);
            const progression = parseInt(progressionValue);
            
            if (isNaN(pm) || isNaN(progression)) {
                errorMessage.textContent = "Veuillez entrer des nombres valides.";
                errorMessage.classList.remove('hidden');
                return;
            }
            
            // Generate and display the table
            const table = generateTable(progression, pm);
            displayTable(table);
        }

        // Event listeners
        document.getElementById('generate-btn').addEventListener('click', generateAndDisplay);
        
        document.getElementById('home-btn').addEventListener('click', () => {
            window.location.href = "{{ url_for('accueil') }}";
        });
        
        // Allow pressing Enter in input fields to generate table
        document.getElementById('pm-value').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateAndDisplay();
        });
        
        document.getElementById('progression-value').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateAndDisplay();
        });
    </script>
</body>
</html>
