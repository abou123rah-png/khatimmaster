    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding-top: 60px; /* Espace pour l'en-tête */
            padding-bottom: 40px; /* Espace pour le pied de page */
        }
        
        .mystic-container {
            background: rgba(21, 138, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .btn-mystic {
            background: linear-gradient(45deg, #ff7b00 0%, #ffaa00 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 123, 0, 0.3);
        }
        
        .btn-mystic:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 123, 0, 0.4);
        }
        
        .btn-home {
            background: linear-gradient(45deg, #158aff 0%, #00b4ff 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(21, 138, 255, 0.3);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(21, 138, 255, 0.4);
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 123, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 123, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 123, 0, 0); }
        }
        
        .input-mystic {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 180, 255, 0.3);
        }
        
        .input-mystic:focus {
            outline: none;
            border-color: #158aff;
            box-shadow: 0 0 0 3px rgba(21, 138, 255, 0.3);
        }
        
        .result-box {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .result-box:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(106, 17, 203, 0.3);
        }
        
        /* En-tête simple */
        .simple-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;

        }
        
        /* Pied de page simple */
        .simple-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            padding: 10px 20px;
            z-index: 1000;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .simple-footer a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- En-tête simple (une seule ligne) -->
  <header class="simple-header">
    <a href="{{ url_for('accueil') }}" class="logo">
      <img src="{{ url_for('static', filename='images/icone.png') }}" alt="KhatimMaster">
      KhatimMaster
    </a>
    <span class="text-white text-sm">Poids Spirituel de l'Invocation</span>
  </header>

    <div class="mystic-container w-full max-w-2xl overflow-hidden relative p-6">
        <!-- Floating decorative elements -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-white bg-opacity-10 rounded-full"></div>
        <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-white bg-opacity-5 rounded-full"></div>
        <div class="absolute top-4 right-4 text-white text-2xl">
            <i class="fas fa-moon floating"></i>
        </div>
        <div class="absolute top-4 left-4 text-white text-2xl">
            <i class="fas fa-star floating" style="animation-delay: 0.5s;"></i>
        </div>
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">🔮 Poids Spirituel de l'Invocation</h1>
            <p class="text-blue-200 opacity-90">Calculateur du poids spirituel des phrases arabes</p>
        </div>
        
        <!-- Main content -->
        <div class="mb-8">
            <!-- Input field -->
            <div class="mb-6">
                <label for="phrase" class="block text-lg font-medium text-white mb-2">
                    <i class="fas fa-pen-fancy mr-2"></i>Entrez votre phrase en arabe :
                </label>
                <input 
                    type="text" 
                    id="phrase" 
                    class="w-full input-mystic rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-lg text-right"
                    placeholder="Exemple: بسم الله الرحمن الرحيم"
                >
            </div>
            
            <!-- Buttons -->
            <div class="flex flex-col md:flex-row gap-4 justify-center mb-8">
                <button 
                    onclick="calculateMysticalWeight()"
                    class="btn-mystic text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3 pulse"
                >
                    <i class="fas fa-calculator"></i>
                    Calculer le poids spirituel
                </button>
                
                <button 
                    onclick="window.location.href='/'" 
                    class="btn-home text-white font-semibold py-3 px-6 rounded-xl text-lg flex items-center justify-center gap-3"
                >
                    <i class="fas fa-home"></i>
                    Retour à l'accueil
                </button>
            </div>
            
            <!-- Result -->
            <div id="result-container" class="hidden">
                <div class="result-box rounded-lg p-6 text-center">
                    <p id="result" class="text-white text-2xl font-bold"></p>
                    <div class="flex justify-center gap-4 mt-4 text-white text-opacity-70">
                        <i class="fas fa-hamsa"></i>
                        <i class="fas fa-eye"></i>
                        <i class="fas fa-hand-sparkles"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center text-white text-sm">
            <p>Système basé sur les calculs spirituels arabes traditionnels</p>
        </div>
    </div>

    <!-- Pied de page simple (une seule ligne) -->
    <footer class="simple-footer">
        &copy; KhatimMaster - Par M. Cissé. Tous droits réservés. | <a href="mailto:cissdoro@gmail.com">cissdoro@gmail.com</a>
    </footer>

    <script>
        const arabicWeights = {
            "ا": 1, "أ": 1, "إ": 1, "آ": 1, "ء": 1,
            "ب": 2, "ت": 4, "ث": 5, "ج": 3, "ح": 8,
            "خ": 6, "د": 4, "ذ": 7, "ر": 2, "ز": 7,
            "س": 6, "ش": 3, "ص": 9, "ض": 8, "ط": 9,
            "ظ": 9, "ع": 7, "غ": 1, "ف": 8, "ق": 1,
            "ك": 2, "ل": 3, "م": 4, "ن": 5, "ه": 5,
            "و": 6, "ي": 1, "ى": 1, "ة": 5
        };

        function calculateMysticalWeight() {
            const input = document.getElementById("phrase").value.trim();
            const resultContainer = document.getElementById("result-container");
            const resultElement = document.getElementById("result");
            
            if (!input) {
                resultElement.textContent = "Veuillez entrer une phrase valide";
                resultContainer.classList.remove("hidden");
                return;
            }
            
            let sum = 0;
            for (let letter of input) {
                sum += arabicWeights[letter] || 0;
            }
            
            resultElement.textContent = `🔮 Le poids spirituel de la phrase est: ${sum}`;
            resultContainer.classList.remove("hidden");
            
            // Add animation
            resultContainer.classList.add("animate-bounce");
            setTimeout(() => {
                resultContainer.classList.remove("animate-bounce");
            }, 1000);
        }
        
        // Allow pressing Enter in input field to calculate
        document.getElementById("phrase").addEventListener("keypress", (e) => {
            if (e.key === "Enter") calculateMysticalWeight();
        });
    </script>
