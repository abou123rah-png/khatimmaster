        }

            margin: 1rem auto;

            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        
        .btn-mystic {
            background: linear-gradient(45deg, #ff7b00 0%, #ffaa00 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 123, 0, 0.3);
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        
        .btn-mystic:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 123, 0, 0.4);
        }
        
        .btn-home {
            background: linear-gradient(45deg, #158aff 0%, #00b4ff 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(21, 138, 255, 0.3);
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(21, 138, 255, 0.4);
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
            transition: all 0.3s ease;
            color: #c0c0c0; /* Couleur argentée */
        }
        
        .floating:hover {
            transform: scale(1.2) translateY(-10px);
            color: #ffaa00;
        }
        
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .input-mystic {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 180, 255, 0.3);
            width: 100%;
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-size: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            color: #333;
        }
        
        .input-mystic:focus {
            outline: none;
            border-color: #158aff;
            box-shadow: 0 0 0 3px rgba(21, 138, 255, 0.3);
        }
        
        .result-box {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.75rem;
            padding: 1.25rem;

        /* En-tête simple */

            padding: 0.75rem 1.25rem;

    <div class="container">
        <div class="mystic-container">

            <!-- ✅ Icône ÉTOILE juste après le "s" de Noms -->

            <!-- Header -->

                <h1 class="text-3xl font-bold mb-2">Traducteur de Noms</h1>

            </div>
            
            <!-- Main content -->
            <div class="mb-8">
                <!-- Input field -->

                        placeholder="Ex: mohammed"
                    >

                <!-- Buttons -->
                <div class="button-group mb-8">
                    <button 
                        onclick="translateToArabic()"

                    </button>
                </div>
                
                <!-- Result -->
                <div id="result" class="result-box">
                    <h3 class="font-semibold mb-2">Nom en arabe：</h3>
                    <p id="arabicResult" class="arabic-text text-2xl font-bold"></p>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="text-center text-sm">
                <p>Système basé sur la translittération phonétique</p>
                <div class="flex justify-center gap-4 mt-3 text-white text-opacity-70">

                    <i class="fas fa-language"></i>
                    <i class="fas fa-translate"></i>

    </footer>

    <script>
        const translitMap = {
            'a': 'ا', 'â': 'ا', 'à': 'ا', 'ā': 'ا', 'b': 'ب', 'p': 'پ', 't': 'ت',
            'ṯ': 'ث', 'j': 'ج', 'ǧ': 'ج', 'c': 'چ', 'ḥ': 'ح', 'ẖ': 'خ', 'd': 'د',
            'ḏ': 'ذ', 'r': 'ر', 'z': 'ز', 's': 'س', 'š': 'ش', 'ṣ': 'ص', 'ḍ': 'ض',
            'ṭ': 'ط', 'ẓ': 'ظ', 'ʿ': 'ع', 'ġ': 'غ', 'f': 'ف', 'q': 'ق', 'k': 'ك',
            'l': 'ل', 'm': 'م', 'n': 'ن', 'h': 'ه', 'w': 'و', 'ū': 'و', 'o': 'و',
            'i': 'ي', 'ī': 'ي', 'y': 'ي', 'ء': 'ء', 'أ': 'أ', 'إ': 'إ', 'ؤ': 'ؤ', 'ئ': 'ئ',
            'é': 'ي', 'è': 'ي', 'ê': 'ي', 'ë': 'ي', 'ç': 'س', ' ': ' '
        };

        function translateToArabic() {
            let input = document.getElementById('nameInput').value.toLowerCase();
            if (!input.trim()) {
                alert("Veuillez entrer un nom à traduire");
                return;
            }
            
            input = input.replace(/ou/g, 'و').replace(/o/g, 'و');
            
            let result = '';
            for (let char of input) {
                result += translitMap[char] || char;
            }
            
            document.getElementById('arabicResult').innerText = result;
            document.getElementById('result').classList.add('show');
        }
        
        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') translateToArabic();
        });
    </script>
